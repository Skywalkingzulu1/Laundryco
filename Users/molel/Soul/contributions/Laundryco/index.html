<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maid4U – Professional Laundry Service</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Optional: Tailwind Config for custom breakpoints -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#0d6efd',
              secondary: '#6c757d',
            },
          },
        },
      }
    </script>
    <!-- Custom responsive stylesheet -->
    <link rel="stylesheet" href="style.css">
    <style>
      /* Additional custom styles if needed */
    </style>
</head>
<body class="bg-gray-100 text-gray-900 antialiased">

    <!-- Top Bar -->
    <header class="bg-gray-800 text-white py-2">
        <div class="container mx-auto text-center">
            <p class="text-lg font-semibold">
                The Number <span class="text-indigo-400 text-2xl font-bold italic">#1</span> Exclusive Laundry Delivery Service
            </p>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white shadow-sm" aria-label="Primary navigation">
        <div class="container mx-auto flex flex-wrap items-center justify-between p-4">
            <a href="index.html" class="flex items-center">
                <img src="laundry-1.png" alt="Maid4U Logo" class="w-24 h-24 object-contain mr-2">
                <span class="sr-only">Maid4U Home</span>
            </a>
            <button id="nav-toggle" class="text-gray-500 md:hidden focus:outline-none" aria-controls="nav-menu" aria-expanded="false" aria-label="Toggle navigation">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <ul id="nav-menu" class="hidden w-full md:flex md:items-center md:w-auto space-y-2 md:space-y-0 md:space-x-4 mt-4 md:mt-0">
                <li>
                    <a href="pricing.html" class="block px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        Pricing
                    </a>
                </li>
                <li>
                    <button data-modal-target="#contact-modal" class="block px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        Contact Us
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="container mx-auto my-8 px-4">
        <div class="responsive-grid items-center">
            <!-- Text Content -->
            <div class="hero-text">
                <h1 class="text-4xl font-extrabold mb-4">Fast, Reliable Laundry Service</h1>
                <p class="text-lg mb-6">
                    We pick up, wash, and deliver your laundry right to your doorstep. Experience convenience like never before.
                </p>
                <a href="pricing.html" class="inline-block bg-primary text-white px-6 py-3 rounded hover:bg-indigo-700 transition">
                    View Pricing
                </a>
            </div>
            <!-- Image Content -->
            <div class="hero-image">
                <img src="laundry-hero.jpg" alt="Laundry Service" class="responsive-img rounded-lg shadow-lg">
            </div>
        </div>
    </section>

    <!-- Footer (optional placeholder) -->
    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto text-center">
            <p>&copy; 2024 Maid4U. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
