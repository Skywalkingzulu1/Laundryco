<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maid4U – Professional Laundry Service</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Optional: Tailwind Config for custom breakpoints -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#0d6efd',
              secondary: '#6c757d',
            },
          },
        },
      }
    </script>
</head>
<body class="bg-gray-100 text-gray-900 antialiased">

    <!-- Top Bar -->
    <header class="bg-gray-800 text-white py-2">
        <div class="container mx-auto text-center">
            <p class="text-lg font-semibold">
                The Number <span class="text-indigo-400 text-2xl font-bold italic">#1</span> Exclusive Laundry Delivery Service
            </p>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white shadow-sm" aria-label="Primary navigation">
        <div class="container mx-auto flex flex-wrap items-center justify-between p-4">
            <a href="index.html" class="flex items-center">
                <img src="laundry-1.png" alt="Maid4U Logo" class="w-24 h-24 object-contain mr-2">
                <span class="sr-only">Maid4U Home</span>
            </a>
            <button id="nav-toggle" class="text-gray-500 md:hidden focus:outline-none" aria-controls="nav-menu" aria-expanded="false" aria-label="Toggle navigation">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <ul id="nav-menu" class="hidden w-full md:flex md:items-center md:w-auto space-y-2 md:space-y-0 md:space-x-4 mt-4 md:mt-0">
                <li>
                    <a href="pricing.html" class="block px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        Pricing
                    </a>
                </li>
                <li>
                    <button data-modal-target="#contact-modal" class="block px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        Contact Us
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="container mx-auto my-8 px-4">
        <div class="grid gap-8 md:grid-cols-2 items-center">
            <div class="bg-white p-6 rounded-lg shadow">
                <h1 class="text-4xl font-extrabold mb-4">Laundry Day, Done.</h1>
                <p class="text-lg mb-4">Your Clothes, Washed, Ironed &amp; Delivered!</p>
                <a href="pricing.html" class="inline-block bg-indigo-600 text-white px-6 py-3 rounded hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    Get Started
                </a>
            </div>
            <div class="flex justify-center">
                <img src="hero-image.png" alt="Freshly laundered clothes" class="max-w-full h-auto rounded">
            </div>
        </div>
    </section>

    <!-- Contact Modal (hidden by default) -->
    <div id="contact-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
        <div class="bg-white rounded-lg max-w-md w-full p-6">
            <h2 id="contact-modal-title" class="text-xl font-semibold mb-4">Contact Us</h2>
            <form>
                <label class="block mb-2">
                    <span class="text-gray-700">Name</span>
                    <input type="text" class="mt-1 block w-full border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" required>
                </label>
                <label class="block mb-2">
                    <span class="text-gray-700">Email</span>
                    <input type="email" class="mt-1 block w-full border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" required>
                </label>
                <label class="block mb-4">
                    <span class="text-gray-700">Message</span>
                    <textarea class="mt-1 block w-full border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500" rows="4" required></textarea>
                </label>
                <div class="flex justify-end space-x-2">
                    <button type="button" data-modal-close class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400 focus:outline-none">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 focus:outline-none">Send</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-200 py-6 mt-12">
        <div class="container mx-auto text-center">
            <p>&copy; 2024 Maid4U. All rights reserved.</p>
        </div>
    </footer>

    <!-- Simple JavaScript for modal & nav toggle -->
    <script>
        // Navigation toggle
        const navToggle = document.getElementById('nav-toggle');
        const navMenu = document.getElementById('nav-menu');
        navToggle.addEventListener('click', () => {
            const expanded = navToggle.getAttribute('aria-expanded') === 'true' || false;
            navToggle.setAttribute('aria-expanded', !expanded);
            navMenu.classList.toggle('hidden');
        });

        // Modal handling
        document.querySelectorAll('[data-modal-target]').forEach(btn => {
            btn.addEventListener('click', () => {
                const modal = document.querySelector(btn.getAttribute('data-modal-target'));
                modal.classList.remove('hidden');
            });
        });
        document.querySelectorAll('[data-modal-close]').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.closest('[role="dialog"]').classList.add('hidden');
            });
        });
        // Close modal on Escape key
        window.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                document.querySelectorAll('[role="dialog"]').forEach(modal => modal.classList.add('hidden'));
            }
        });
    </script>
</body>
</html>
